<div class="p-6 max-w-md mx-auto bg-white rounded-xl shadow-md space-y-4">
      <h2 class="text-2xl font-bold text-slate-900">Zenith Auditor</h2>
      
      <div>
        <label class="block text-sm font-medium text-slate-700">Enter Amount (€)</label>
        <input 
          type="number" 
          (input)="finance.updateAmount(input.value)" 
          #input
          class="mt-1 block w-full border border-slate-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500"
          placeholder="0.00"
        />
      </div>

      <div class="pt-4 border-t border-slate-100">
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">VAT (20%):</span>
          <span class="font-mono text-slate-900">€{{ finance.taxAmount() }}</span>
        </div>
        
        <div class="flex justify-between text-lg font-bold mt-2">
          <span>Total:</span>
          <span class="text-blue-600">€{{ finance.totalWithTax() }}</span>
        </div>
      </div>

      @if (finance.amount() > 10000) {
        <div class="p-3 bg-amber-50 border border-amber-200 text-amber-700 text-xs rounded">
          ⚠️ High value transaction detected. Requires Senior approval.
        </div>
      }
    </div>
